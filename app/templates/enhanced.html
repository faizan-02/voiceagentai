<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Voice Chat AI with OpenAI Enhanced features">
    <meta name="keywords" content="AI, voice chat, OpenAI, GPT-4o, TTS, speech-to-text">
    <meta name="author" content="bigsk1">
    <title>Voice Chat AI - OpenAI Enhanced</title>
    <link rel="stylesheet" href="/app/static/css/styles.css">
    <link rel="icon" href="/app/static/favicon.ico" type="image/x-icon">
    <style>
        .chat-panel { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
        .chat-panel .controls   { margin-bottom: 0; }
        .chat-panel .status-bar { margin-bottom: 0; }
        .chat-panel #conversation { margin-bottom: 0; }
    </style>
</head>
<body class="dark-mode">
    <header>
        <h1>
            Voice Chat AI
            <div id="mic-icon" class="mic-off">&#x1F399;</div>
        </h1>
        <div class="header-controls">
            <div class="button-group">
                <button id="theme-toggle" aria-label="Toggle dark/light mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button id="download-button" aria-label="Download conversation history" title="Download conversation history">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-download">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="/">Beauty Salon AI Agent</a></li>
                    <li><a href="/enhanced" class="active">Other AI Agents</a></li>
                    <li><a href="/webrtc_realtime">Realtime</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="chat-panel">
            <div class="controls">
                <button id="startBtn" class="btn-start btn-active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:5px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Start
                </button>
                <button id="stopBtn" class="btn-stop" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:5px"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    Stop
                </button>
                <button id="clearBtn" class="btn-clear">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                    Clear
                </button>
            </div>

            <div id="status-bar-enhanced" class="status-bar status-idle">
                <span class="status-dot">○</span>
                <span class="status-label">Ready — press Start to begin</span>
            </div>

            <div id="conversation">
                <div id="messages"></div>
                <div id="voiceWaveAnimation" class="hidden">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="8"/>
                        <g id="voice-bars">
                            <rect x="30" y="35" width="8" height="30" rx="4"/>
                            <rect x="46" y="25" width="8" height="50" rx="4"/>
                            <rect x="62" y="35" width="8" height="30" rx="4"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>

        <div class="settings" style="margin-top:1rem;">
            <div class="setting-group">
                <label for="characterSelect">Character</label>
                <select id="characterSelect"></select>
            </div>
            <div class="setting-group">
                <label for="voiceSelect">Voice</label>
                <select id="voiceSelect">
                    <option value="alloy">Alloy - female</option>
                    <option value="echo">Echo - male</option>
                    <option value="fable">Fable - male</option>
                    <option value="onyx">Onyx - male</option>
                    <option value="nova">Nova - female</option>
                    <option value="shimmer">Shimmer - female</option>
                    <option value="sage">Sage - female</option>
                    <option value="coral">Coral - female</option>
                    <option value="ash">Ash - male</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="modelSelect">Chat Model</label>
                <select id="modelSelect">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="ttsModelSelect">TTS Model</label>
                <select id="ttsModelSelect">
                    <option value="tts-1" selected>TTS-1</option>
                    <option value="tts-1-hd">TTS-1 HD</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="transcriptionModelSelect">Transcription</label>
                <select id="transcriptionModelSelect">
                    <option value="gpt-4o-mini-transcribe" selected>GPT-4o Mini Transcribe</option>
                    <option value="gpt-4o-transcribe">GPT-4o Transcribe</option>
                    <option value="whisper-1">OpenAI Whisper-1</option>
                </select>
            </div>
        </div>
    </main>

    <script src="/app/static/js/enhanced.js"></script>
</body>
</html>
